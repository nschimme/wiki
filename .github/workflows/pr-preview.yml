name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ github.event.number }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: npm run docs:build
        env:
          VITEPRESS_BASE: /pr-${{ github.event.number }}/

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: docs/.vitepress/dist
          retention-days: 7

  deploy-preview:
    needs: build
    runs-on: ubuntu-latest
    # Only run on the base repo (not forks) since we need Pages write access
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout base repo
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: pr-${{ github.event.number }}

      - name: Commit preview to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pr-${{ github.event.number }}
          git commit -m "Deploy PR #${{ github.event.number }} preview" || echo "Nothing to commit"
          git push

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.number
            const previewUrl = `https://wiki.mume.org/pr-${prNumber}/`
            const body = `### 👁️ Preview deployed\n\n**URL:** ${previewUrl}\n\nThis preview will be available until the PR is closed.`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview deployed')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }

  # For forks: just comment that the artifact is available for download
  notify-fork:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name != github.repository
    permissions:
      pull-requests: write
    steps:
      - name: Comment artifact link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.number
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = `### 🔨 Preview built\n\nA preview artifact was built for this PR. Download it from the [workflow run](${runUrl}) under **Artifacts → pr-preview-${prNumber}**.\n\n*(Live preview deploys are only available after merge to main for fork PRs.)*`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview built')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
