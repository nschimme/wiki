name: PR Preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# pull_request_target runs in the base repo context (has write access).
# We check out the PR head to build it, which is acceptable for a public
# markdown wiki where the build step only runs VitePress on markdown files.
permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: npm run docs:build
        env:
          # Upstream: /pr-{n}/   Fork: /{repo}/pr-{n}/
          VITEPRESS_BASE: ${{ github.repository == 'MUME/wiki' && format('/pr-{0}/', github.event.number) || format('/{0}/pr-{1}/', github.event.repository.name, github.event.number) }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.number }}
          path: docs/.vitepress/dist
          retention-days: 30

      - name: Comment build status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.number
            const owner = context.repo.owner
            const repo = context.repo.repo
            const body = `### Build ready\n\nThe build for this PR has been completed successfully. A live preview will be available once a maintainer approves this PR.`

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            })
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Build ready')
            )
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr, body })
            }
